
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 03</title>
</head>
<body>
    <h1>TEST</h1>
    <div class="change">

        <label for="size">Size:</label>
        <input name="size" type="range" min="50" max="200" value="100" data-suf="px">
        
        <label for="blur">Blur:</label>
        <input name="blur" type="range" min="0" max="20" value="0" data-suf="px">

        <label for="textColor">Colour:</label>
        <input name="textColor" type="color" value='#ADD8E6'>

    </div>

    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        :root{
            --size: 100px;
            --blur: 0px;
            --textColor: #ADD8E6;
        }
        h1{ 
            position: fixed;
            bottom: 45%;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: bottom center;
            color: var(--textColor);
            filter: blur(var(--blur));
            font-size: var(--size);
            white-space: nowrap;
        }
        .change{
            position: fixed;
            bottom: 400px;
            left: 0;
            width: 100%;
            text-align: center;
        }
    </style>
  
<script>
    const inputs = document.querySelectorAll('.change input')
    function doTheChanges(){
        const suffix = this.dataset.suf || '';
        document.documentElement.style.setProperty(`--${this.name}`, this.value + suffix)
    }
    inputs.forEach(input => input.addEventListener('change', doTheChanges))
    inputs.forEach(input => input.addEventListener('mousemove', doTheChanges))
</script>
</body>
</html>
