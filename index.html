<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 03</title>
  
</head>
<body>
    <h1> TEST </h1>
    <div class="change">

        <label for="size"> Size:</label>
        <Input name="size" type="range" min="50" max="250" value="100" data-suf="px">
        
        <label for="blur"> Blur:</label>
        <input name="blur" type="range" min="0" max="20" value="10" data-suf="px">

        <label for="colour">Colour: </label>
        <input name="colour" type="colour" value='#ADD8E6'>

    </div>

    <style>
        :root{
            --size: 100px;
            --blur: 10px;
            --colour: #ADD8E6;
        }
        h1{ 
            color: var(--colour);
            filter: blur(var(--blur));
            font-size: var(--size);
        }
    </style>
  
<script>
    const inputs = document.querySelectorAll('.change input')
    function doTheChanges(){
        const suffix = this.dataset.suf || '';
        document.documentElement.style.setProperty(`--${this.name}`,this.value + suffix)
    }
    inputs.forEach(input => input.addEventListener('change', doTheChanges))
    inputs.forEach(input => input.addEventListener('mousemove', doTheChanges))
  
</script>
</body>
</html>
